<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VAT Manager{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .status-completed { background-color: #10b981; }
        .status-running { background-color: #3b82f6; animation: pulse 2s infinite; }
        .status-failed { background-color: #ef4444; }
        .status-pending { background-color: #6b7280; }
        .status-skipped { background-color: #d1d5db; }
        .status-blocked { background-color: #374151; opacity: 0.5; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        /* Toast 动画 */
        .toast-enter { animation: toastIn 0.3s ease-out; }
        .toast-exit { animation: toastOut 0.3s ease-in forwards; }
        @keyframes toastIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes toastOut {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-20px); opacity: 0; }
        }
        /* 可排序表头 */
        th[data-sort] { cursor: pointer; user-select: none; position: relative; }
        th[data-sort]:hover { background-color: #f3f4f6; }
        th[data-sort]::after { content: '⇅'; opacity: 0.3; margin-left: 4px; font-size: 0.75em; }
        th[data-sort].sort-asc::after { content: '▲'; opacity: 0.8; }
        th[data-sort].sort-desc::after { content: '▼'; opacity: 0.8; }
        /* 筛选标签 */
        .filter-tag { transition: all 0.15s; }
        .filter-tag.active { font-weight: 600; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between">
                <a href="/" class="text-xl font-bold text-gray-800">🎬 VAT Manager</a>
                <div class="flex items-center space-x-6">
                    <a href="/" class="text-gray-600 hover:text-gray-900 {% if request.url.path == '/' %}font-semibold text-blue-600{% endif %}">
                        📹 视频
                    </a>
                    <a href="/playlists" class="text-gray-600 hover:text-gray-900 {% if '/playlists' in request.url.path %}font-semibold text-blue-600{% endif %}">
                        📂 Playlist
                    </a>
                    <a href="/tasks" class="text-gray-600 hover:text-gray-900 {% if '/tasks' in request.url.path %}font-semibold text-blue-600{% endif %}">
                        ⚙️ 任务
                    </a>
                    <a href="/prompts" class="text-gray-600 hover:text-gray-900 {% if '/prompts' in request.url.path %}font-semibold text-blue-600{% endif %}">
                        📝 Prompts
                    </a>
                    <a href="/watch" class="text-gray-600 hover:text-gray-900 {% if '/watch' in request.url.path %}font-semibold text-blue-600{% endif %}">
                        👁️ Watch
                    </a>
                    <a href="/bilibili" class="text-gray-600 hover:text-gray-900 {% if '/bilibili' in request.url.path %}font-semibold text-pink-600{% endif %}">
                        📺 B站
                    </a>
                    <a href="https://github.com/112292454/VAT" target="_blank" class="text-gray-400 hover:text-gray-700" title="GitHub">
                        <svg class="w-5 h-5 inline" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                    </a>
                </div>
            </div>
        </div>
    </nav>
    
    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="text-center text-gray-500 text-sm py-4">
        VAT - Video to Hanzi Translator
    </footer>
    
    <!-- Toast 容器 -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>
    
    <!-- 全局 Toast 和模态框工具函数 -->
    <script>
    // Toast 通知系统
    function showToast(message, type = 'info', duration = 3000) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        
        const colors = {
            success: 'bg-green-500',
            error: 'bg-red-500',
            warning: 'bg-yellow-500',
            info: 'bg-blue-500'
        };
        
        const icons = {
            success: '✓',
            error: '✕',
            warning: '⚠',
            info: 'ℹ'
        };
        
        toast.className = `${colors[type] || colors.info} text-white px-4 py-3 rounded-lg shadow-lg flex items-center space-x-2 toast-enter min-w-64 max-w-md`;
        toast.innerHTML = `
            <span class="text-lg">${icons[type] || icons.info}</span>
            <span class="flex-1">${message}</span>
            <button onclick="this.parentElement.remove()" class="ml-2 hover:opacity-70">×</button>
        `;
        
        container.appendChild(toast);
        
        if (duration > 0) {
            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }
        
        return toast;
    }
    
    // 模态框点击外部关闭支持
    function setupModalClickOutside(modalId, closeCallback) {
        const modal = document.getElementById(modalId);
        if (!modal) return;
        
        modal.addEventListener('click', function(e) {
            // 只有点击模态框背景（而非内容区域）时才关闭
            if (e.target === modal) {
                if (typeof closeCallback === 'function') {
                    closeCallback();
                } else {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }
            }
        });
    }
    
    // 初始化所有带 data-modal-close 属性的模态框
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('[data-modal]').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }
            });
        });
    });
    
    // ==================== 通用表格排序 ====================
    // 用法：在 <th> 上加 data-sort="col-index" data-sort-type="text|number|date"
    //       在 <td> 上加 data-sort-value="实际排序值"（可选，默认用 textContent）
    function initSortableTable(tableEl) {
        if (!tableEl) return;
        const headers = tableEl.querySelectorAll('th[data-sort]');
        headers.forEach(th => {
            th.addEventListener('click', () => {
                const colIdx = parseInt(th.dataset.sort);
                const sortType = th.dataset.sortType || 'text';
                const isAsc = th.classList.contains('sort-asc');
                // 清除所有排序状态
                headers.forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
                // 设置新状态
                th.classList.add(isAsc ? 'sort-desc' : 'sort-asc');
                const desc = isAsc;
                
                const tbody = tableEl.querySelector('tbody');
                const rows = Array.from(tbody.querySelectorAll('tr:not(.no-sort)'));
                
                rows.sort((a, b) => {
                    const aCell = a.cells[colIdx];
                    const bCell = b.cells[colIdx];
                    if (!aCell || !bCell) return 0;
                    let aVal = aCell.dataset.sortValue ?? aCell.textContent.trim();
                    let bVal = bCell.dataset.sortValue ?? bCell.textContent.trim();
                    
                    if (sortType === 'number') {
                        aVal = parseFloat(aVal) || 0;
                        bVal = parseFloat(bVal) || 0;
                        return desc ? bVal - aVal : aVal - bVal;
                    }
                    if (sortType === 'date') {
                        aVal = new Date(aVal || 0).getTime() || 0;
                        bVal = new Date(bVal || 0).getTime() || 0;
                        return desc ? bVal - aVal : aVal - bVal;
                    }
                    // text
                    return desc ? bVal.localeCompare(aVal, 'zh') : aVal.localeCompare(bVal, 'zh');
                });
                
                rows.forEach(row => tbody.appendChild(row));
            });
        });
    }
    
    // ==================== 通用行筛选 ====================
    // 用法：在 <tr> 上加 data-filter-xxx="value"，调用 filterTableRows 按条件显示/隐藏
    function filterTableRows(tableEl, filterFn) {
        if (!tableEl) return;
        const rows = tableEl.querySelectorAll('tbody tr');
        let visibleCount = 0;
        rows.forEach(row => {
            if (row.classList.contains('no-filter')) return; // 跳过"无数据"提示行
            const show = filterFn(row);
            row.style.display = show ? '' : 'none';
            if (show) visibleCount++;
        });
        // 显示/隐藏"无匹配"提示
        let emptyRow = tableEl.querySelector('.filter-empty-row');
        if (visibleCount === 0) {
            if (!emptyRow) {
                emptyRow = document.createElement('tr');
                emptyRow.className = 'filter-empty-row no-sort no-filter';
                const cols = tableEl.querySelector('thead tr')?.cells.length || 6;
                emptyRow.innerHTML = `<td colspan="${cols}" class="px-6 py-8 text-center text-gray-500">没有匹配的记录</td>`;
                tableEl.querySelector('tbody').appendChild(emptyRow);
            }
            emptyRow.style.display = '';
        } else if (emptyRow) {
            emptyRow.style.display = 'none';
        }
        return visibleCount;
    }
    
    // 更新筛选按钮的激活状态
    function setActiveFilter(container, activeValue) {
        // 收集所有可能的 active 样式类（用于 remove 时清理干净）
        const allActiveClasses = new Set();
        container.querySelectorAll('.filter-tag').forEach(tag => {
            (tag.dataset.activeClass || '').split(/\s+/).filter(Boolean).forEach(c => allActiveClasses.add(c));
        });

        container.querySelectorAll('.filter-tag').forEach(tag => {
            const isActive = tag.dataset.filterValue === activeValue;
            tag.classList.toggle('active', isActive);
            const activeClasses = (tag.dataset.activeClass || 'bg-gray-800 text-white').split(/\s+/).filter(Boolean);
            if (isActive) {
                tag.classList.remove('bg-gray-200', 'text-gray-700');
                tag.classList.add(...activeClasses);
            } else {
                tag.classList.add('bg-gray-200', 'text-gray-700');
                tag.classList.remove(...allActiveClasses);
            }
        });
    }
    </script>
</body>
</html>
